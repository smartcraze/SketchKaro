name: Docker Image CI

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push HTTP Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/http-backend/Dockerfile
          push: true
          tags: |
            smartcraze/sketchkaro-http-backend:latest
            smartcraze/sketchkaro-http-backend:${{ github.sha }}

      - name: Build and push WS Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/ws-backend/Dockerfile
          push: true
          tags: |
            smartcraze/sketchkaro-ws-backend:latest
            smartcraze/sketchkaro-ws-backend:${{ github.sha }}

      - name: Build and push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: |
            smartcraze/sketchkaro-web:latest
            smartcraze/sketchkaro-web:${{ github.sha }}
